name: Update OxiDNS

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        submodules: recursive
        fetch-depth: 0

      - name: Get latest release
        id: release
        run: |
          VERSION=$(curl -fsSL \
            https://api.github.com/repos/svenshi/oxidns/releases/latest \
            | jq -r '.tag_name')

          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^PKG_VERSION:=' oxidns/Makefile | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check update
        id: check
        run: |
          if [ "${{ steps.release.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release files
        if: steps.check.outputs.update == 'true'
        run: |
          VERSION=${{ steps.release.outputs.version }}
          BASE_URL="https://github.com/svenshi/oxidns/releases/download/v${VERSION}"

          wget -q "${BASE_URL}/oxidns-x86_64-unknown-linux-gnu.tar.gz"
          wget -q "${BASE_URL}/oxidns-x86_64-unknown-linux-musl.tar.gz"
          wget -q "${BASE_URL}/oxidns-aarch64-unknown-linux-gnu.tar.gz"
          wget -q "${BASE_URL}/oxidns-aarch64-unknown-linux-musl.tar.gz"

      - name: Calculate hashes
        if: steps.check.outputs.update == 'true'
        run: |
          echo "HASH_X86_64_GLIBC=$(sha256sum oxidns-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "HASH_X86_64_MUSL=$(sha256sum oxidns-x86_64-unknown-linux-musl.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "HASH_AARCH64_GLIBC=$(sha256sum oxidns-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "HASH_AARCH64_MUSL=$(sha256sum oxidns-aarch64-unknown-linux-musl.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Update Makefile
        if: steps.check.outputs.update == 'true'
        run: |
          MAKEFILE=package/oxidns/Makefile

          sed -i \
            "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ steps.release.outputs.version }}/" \
            "$MAKEFILE"

          sed -i \
            "s/^PKG_HASH_X86_64_GLIBC:=.*/PKG_HASH_X86_64_GLIBC:=${HASH_X86_64_GLIBC}/" \
            "$MAKEFILE"

          sed -i \
            "s/^PKG_HASH_X86_64_MUSL:=.*/PKG_HASH_X86_64_MUSL:=${HASH_X86_64_MUSL}/" \
            "$MAKEFILE"

          sed -i \
            "s/^PKG_HASH_AARCH64_GLIBC:=.*/PKG_HASH_AARCH64_GLIBC:=${HASH_AARCH64_GLIBC}/" \
            "$MAKEFILE"

          sed -i \
            "s/^PKG_HASH_AARCH64_MUSL:=.*/PKG_HASH_AARCH64_MUSL:=${HASH_AARCH64_MUSL}/" \
            "$MAKEFILE"

      - name: Commit changes
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add oxidns/Makefile

          git diff --cached --quiet && exit 0

          git commit -m "oxidns: bump to v${{ steps.release.outputs.version }}"

          git push